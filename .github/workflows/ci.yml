name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Provision .env.json from example
        run: cp .env.example.json .env.json

      - name: Lint
        run: npm run lint:ci

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "docs/**/*.md" "!docs/plans/**" "README.md" "CHANGELOG.md"

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml "docs/*.md" "README.md" "CHANGELOG.md"
          fail: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
